<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Code Usage Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css?v=8" />
  </head>
  <body>
    <header>
      <div class="header-logo">
        <svg
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <rect x="3" y="12" width="4" height="8" rx="1" fill="#5a67f2" />
          <rect x="10" y="7" width="4" height="13" rx="1" fill="#5a67f2" />
          <rect x="17" y="3" width="4" height="17" rx="1" fill="#5a67f2" />
        </svg>
        <h1><span class="brand">Claude Code</span> Usage Dashboard</h1>
      </div>
      <div class="header-actions">
        <a
          class="usage-btn"
          href="https://claude.ai/settings/usage"
          target="_blank"
          rel="noopener"
          title="Claude usage & limits"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="m12 14 4-4" />
            <path d="M3.34 19a10 10 0 1 1 17.32 0" />
          </svg>
        </a>
        <button
          class="theme-btn"
          id="themeBtn"
          onclick="toggleTheme()"
          title="Toggle theme"
          aria-label="Toggle theme"
        ></button>
        <button
          class="settings-btn"
          id="settingsBtn"
          onclick="showTab('settings')"
          title="Settings"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
            />
          </svg>
          <span class="btn-label">Settings</span>
        </button>
        <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">
          <svg
            id="refreshIcon"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M1 4v6h6" />
            <path d="M23 20v-6h-6" />
            <path
              d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"
            />
          </svg>
          <span class="btn-label">Refresh</span>
        </button>
      </div>
    </header>

    <nav>
      <button class="tab active" onclick="showTab('overview')">Overview</button>
      <button class="tab" onclick="showTab('projects')">Projects</button>
      <button class="tab" onclick="showTab('sessions')">Sessions</button>
      <button class="tab" onclick="showTab('settings')">Settings</button>
    </nav>

    <main>
      <!-- ── Overview ──────────────────────────────────────────────────────── -->
      <div class="page active" id="page-overview">
        <div class="kpi-grid" id="kpiGrid">
          <div class="loading">
            <div class="spinner"></div>
            Loading…
          </div>
        </div>
        <div class="chart-grid">
          <div class="chart-card wide">
            <div class="chart-card-header">
              <h3>Daily Equivalent API Cost (USD)</h3>
              <div class="range-controls">
                <div class="seg-toggle" id="rangeToggle">
                  <button class="seg-opt" data-range="7" onclick="setDailyRange('7')">7D</button>
                  <button class="seg-opt active" data-range="14" onclick="setDailyRange('14')">14D</button>
                  <button class="seg-opt" data-range="all" onclick="setDailyRange('all')">All</button>
                  <button class="seg-opt" data-range="custom" onclick="setDailyRange('custom')">Custom</button>
                </div>
                <div class="range-custom" id="rangeCustom">
                  <input type="date" id="rangeFrom" onchange="applyCustomRange()" aria-label="From date" />
                  <span class="range-dash">–</span>
                  <input type="date" id="rangeTo" onchange="applyCustomRange()" aria-label="To date" />
                </div>
              </div>
            </div>
            <canvas id="dailyCostChart"></canvas>
          </div>
          <div class="chart-card">
            <div class="chart-card-header">
              <h3 id="donutTitle">Token Share by Model</h3>
              <div class="seg-toggle" id="donutToggle">
                <button class="seg-opt active" onclick="setDonutMode('tokens')">
                  Tokens
                </button>
                <button class="seg-opt" onclick="setDonutMode('cost')">
                  Est. Cost
                </button>
              </div>
            </div>
            <canvas id="modelDonut"></canvas>
          </div>
          <div class="chart-card">
            <h3>Top Tool Usage</h3>
            <canvas id="toolsBar"></canvas>
          </div>
        </div>
        <div class="chart-card" style="margin-bottom: 28px">
          <h3>Projects by Cost</h3>
          <div id="projectsBar"></div>
        </div>
        <div class="chart-card wide" style="margin-bottom: 28px">
          <div class="chart-card-header">
            <h3>Activity Heatmap <span class="muted" style="font-weight:400;font-size:.78rem">— by hour, local time</span></h3>
            <div class="seg-toggle" id="heatToggle">
              <button class="seg-opt active" onclick="setHeatMode('all')">All msgs</button>
              <button class="seg-opt" onclick="setHeatMode('turns')">Turns</button>
              <button class="seg-opt" onclick="setHeatMode('prompts')">Prompts</button>
            </div>
          </div>
          <div id="activityHeatmap"></div>
        </div>
        <div class="chart-grid">
          <div class="chart-card">
            <h3>Autonomy Profile <span class="muted" style="font-weight:400;font-size:.78rem">— permission modes</span></h3>
            <canvas id="autonomyDonut"></canvas>
          </div>
          <div class="chart-card">
            <h3>Top Skills Invoked</h3>
            <canvas id="skillsBar"></canvas>
            <div id="skillsEmpty" class="muted" style="display:none;padding:24px 4px">No skills invoked yet.</div>
          </div>
        </div>
      </div>

      <!-- ── Projects ──────────────────────────────────────────────────────── -->
      <div class="page" id="page-projects">
        <div id="projectsContent">
          <div class="loading">
            <div class="spinner"></div>
            Loading…
          </div>
        </div>
      </div>

      <!-- ── Sessions ──────────────────────────────────────────────────────── -->
      <div class="page" id="page-sessions">
        <div id="sessionsContent">
          <div class="loading">
            <div class="spinner"></div>
            Loading…
          </div>
        </div>
      </div>

      <!-- ── Settings ──────────────────────────────────────────────────────── -->
      <div class="page" id="page-settings">
        <div id="settingsContent">
          <div class="loading">
            <div class="spinner"></div>
            Loading…
          </div>
        </div>
      </div>
    </main>

    <!-- Session detail modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
      <div class="modal" id="modal">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div id="modalContent"></div>
      </div>
    </div>

    <div id="toast"></div>

    <script src="/static/chart.umd.min.js"></script>
    <script src="/static/app.js?v=15"></script>
  </body>
</html>
